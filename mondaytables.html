<!DOCTYPE html>
<html>
    <table>
        <colgroup>
        <col style="background-color: lightgray;">
    <col span="2" style="background-color: lightblue;">
        </colgroup>
        <tr>
            <th> name</th>
            <th>age</th>
            <th>city</th>
        </tr>
        <tr>
            <td> john doe</td>
            <td>30</td>
            <td>newyork</td>
        </tr>
        <tr>
            <td> jane smith</td>
            <td>20</td>

        </tr>

        <br><br>        
        <table>
            <caption> Sales data</caption>
            <thead>
                <tr>
                    <th>month</th>
                    <th>sales</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>february</td>
                    <td>1000$</td>
                </tr>
                <tr>

                </tr>

                <tr>

        </table>
        <br><br>
        <table>
            <tr>
                <th>name</th>
                <th colspan="2">contact</th>
            </tr>
            <tr>
               <td>john</td>
                 <td>email</td>
                   <td>phone</td>
            </tr>
            <tr>
                <td rowspan="2">jane</td>
                <td>email</td>
                   <td>phone</td>
            </tr>
            <tr>
                <!--jane's rowspan covers this row, so we need two cells for contact-->
                <td>fax</td>

            </tr>
